<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biriyanidibe | Satkhira Sadar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Ubuntu:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00a86b; --danger: #ff4d4d; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Hind Siliguri', sans-serif; margin: 0; background: var(--bg); color: #1e293b; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; box-shadow: 0 2px 20px rgba(0,0,0,0.05); }
        .logo-container { display: flex; align-items: center; gap: 8px; }
        .logo-text { font-family: 'Ubuntu', sans-serif; font-size: 1.4rem; font-weight: 700; color: #1e293b; }
        .logo-text span { color: var(--primary); }
        .biriyani-icon-top { font-size: 1.6rem; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .container { max-width: 450px; margin: auto; padding: 15px; flex: 1; }
        
        /* CHOTO MAP WRAPPER */
        .map-wrapper { position: relative; background: var(--white); padding: 6px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; overflow: hidden; }
        #map { height: 180px; width: 100%; border-radius: 20px; }

        /* ADMIN STATUS BADGE */
        #admin-active-badge { 
            display: none; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); 
            background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(5px); color: #00ffa3; 
            padding: 6px 15px; border-radius: 50px; z-index: 1000; font-size: 0.75rem; 
            font-weight: 700; border: 1px solid rgba(0, 255, 163, 0.3); white-space: nowrap; 
        }

        /* BIG BIRIYANI MARKER */
        .food-marker { 
            background: white; border: 3px solid var(--primary); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 30px !important; width: 55px !important; height: 55px !important; 
            box-shadow: 0 8px 15px rgba(0,168,107,0.4);
        }

        .glass-input { background: var(--white); padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 25px; }
        select, input { width: 100%; padding: 12px; margin-top: 8px; border: 1.5px solid #f1f5f9; border-radius: 12px; outline: none; background: #f8fafc; font-family: inherit; box-sizing: border-box; }
        .submit-btn { background: linear-gradient(135deg, #00a86b, #01d688); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        .mosque-card { background: var(--white); padding: 20px; border-radius: 22px; margin-bottom: 15px; border: 1px solid #f1f5f9; position: relative; }
        .location-tag { font-size: 0.75rem; color: #94a3b8; font-weight: 700; display: block; }
        
        .food-text { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 12px; margin: 10px 0; color: #334155; }
        .food-icon-box { background: #f0fdf4; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* POPUPS */
        .status-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 30px; border-radius: 30px; z-index: 5000; width: 280px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.3); animation: popScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #welcome-popup { background: white; border: 2px solid var(--primary); }
        #wrong-popup { background: #fff5f5; border: 2px solid var(--danger); }
        @keyframes popScale { from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        /* FOOTER FIXED */
        footer { text-align: center; padding: 30px 20px; border-top: 1px solid #f1f5f9; background: #fff; margin-top: auto; }
        .dev-name { color: var(--primary); font-weight: 800; font-size: 1.1rem; }
        .copy-text { color: #94a3b8; font-size: 0.85rem; font-weight: 600; margin-top: 5px; display: block; }

        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .social-links a { width: 42px; height: 42px; background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #1e293b; text-decoration: none; font-size: 1.2rem; transition: 0.3s; }
        .social-links a:hover { background: var(--primary); color: white; }

        #pass-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:3000; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .modal-box { background:white; padding:30px; border-radius:25px; text-align:center; width:280px; }
    </style>
</head>
<body>

    <div id="welcome-popup" class="status-popup">
        <div style="font-size: 3rem; margin-bottom: 10px;">🍲</div>
        <h3 style="margin: 0;">Admin Active</h3>
        <p style="color: var(--primary); font-weight: 700;">SECURED BY SAKIB</p>
    </div>

    <div id="wrong-popup" class="status-popup">
        <div style="font-size: 3rem; margin-bottom: 10px;">🚫</div>
        <h3 style="color: #b91c1c; margin: 0;">ভুল পাসওয়ার্ড!</h3>
        <p style="font-weight: 600;">তুই বিরিয়ানি ফিড চেক কর,<br>এডমিন মুডে কী?</p>
    </div>

    <nav>
        <div class="logo-container">
            <div class="logo-text">Biriyani<span>dibe</span></div>
            <div class="biriyani-icon-top">🍲</div>
        </div>
        <div id="adminBtn" style="cursor:pointer; color:#64748b;"><i class="fas fa-fingerprint fa-lg"></i></div>
    </nav>

    <div class="container">
        <div class="map-wrapper">
            <div id="admin-active-badge">Admin Mode Active | SAKIB</div>
            <div id="map"></div>
        </div>

        <div class="glass-input">
            <select id="mosqueSelect">
                <option value="">মসজিদ সিলেক্ট করুন</option>
                <option value="সাতক্ষীরা সরকারি কলেজ মসজিদ" data-lat="22.7188" data-lon="89.0705">সাতক্ষীরা সরকারি কলেজ মসজিদ</option>
                <option value="সাতক্ষীরা কেন্দ্রীয় জামে মসজিদ" data-lat="22.7102" data-lon="89.0715">সাতক্ষীরা কেন্দ্রীয় জামে মসজিদ</option>
                <option value="সদর হাসপাতাল জামে মসজিদ" data-lat="22.7125" data-lon="89.0735">সদর হাসপাতাল জামে মসজিদ</option>
            </select>
            <input type="text" id="customMosqueName" placeholder="অথবা মসজিদের নাম...">
            <input type="text" id="foodMenu" placeholder="আজকের ইফতার মেনু...">
            <button class="submit-btn" onclick="postIftar()">পাবলিশ করুন</button>
        </div>

        <div id="updateList"></div>
    </div>

    <div id="pass-modal">
        <div class="modal-box">
            <i class="fas fa-lock" style="font-size: 2rem; color: var(--primary); margin-bottom: 15px;"></i>
            <input type="password" id="adminPass" placeholder="পিন কোড দিন" style="text-align:center;">
            <button class="submit-btn" onclick="unlockAdmin()">আনলক</button>
        </div>
    </div>

    <footer>
        <span class="dev-name">DEVELOPER SAKIB</span>
        <span class="copy-text">©2026 | SATKHIRA SADAR</span>
        <div class="social-links">
            <a href="https://facebook.com/sakib" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://github.com/sakib" target="_blank"><i class="fab fa-github"></i></a>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAqP9zVb_Nz9eKE5MCqKgNhCBLAe1ya5bs",
            databaseURL: "https://satkhira-iftary-default-rtdb.firebaseio.com",
            projectId: "satkhira-iftary",
            appId: "1:58587509961:web:f855940e4bb125af6cc918"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let isAdmin = false, map, markers = L.layerGroup();

        document.getElementById('adminBtn').onclick = () => document.getElementById('pass-modal').style.display = 'flex';

        function unlockAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "75") {
                isAdmin = true;
                document.getElementById('pass-modal').style.display = 'none';
                document.getElementById('welcome-popup').style.display = 'block';
                document.getElementById('adminBtn').style.color = "var(--primary)";
                document.getElementById('admin-active-badge').style.display = 'block';
                setTimeout(() => { 
                    document.getElementById('welcome-popup').style.display = 'none'; 
                    loadPosts();
                }, 2000);
            } else {
                document.getElementById('pass-modal').style.display = 'none';
                document.getElementById('wrong-popup').style.display = 'block';
                setTimeout(() => { document.getElementById('wrong-popup').style.display = 'none'; }, 3500);
            }
            document.getElementById('adminPass').value = '';
        }

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([22.7133, 89.0722], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markers.addTo(map);
            loadPosts();
        }

        function postIftar() {
            const select = document.getElementById('mosqueSelect');
            const customName = document.getElementById('customMosqueName').value;
            const food = document.getElementById('foodMenu').value;
            let finalName = customName ? customName : select.value;
            if(!finalName || !food) return;

            let lat = 22.7133, lon = 89.0722;
            if(!customName && select.selectedIndex > 0) {
                lat = select.options[select.selectedIndex].dataset.lat;
                lon = select.options[select.selectedIndex].dataset.lon;
            }
            db.ref('iftar_posts').push({ name: finalName, food: food, lat: lat, lon: lon });
            document.getElementById('foodMenu').value = '';
            document.getElementById('customMosqueName').value = '';
        }

        function loadPosts() {
            db.ref('iftar_posts').on('value', (snap) => {
                const list = document.getElementById('updateList');
                list.innerHTML = ''; markers.clearLayers();
                const data = snap.val();
                if(data) {
                    Object.keys(data).reverse().forEach(id => {
                        const item = data[id];
                        let icon = (item.food.includes("বিরিয়ানি")) ? "🍛" : "🍲";
                        L.marker([item.lat, item.lon], {icon: L.divIcon({html: icon, className: 'food-marker', iconSize:[55,55]})}).addTo(markers);

                        list.innerHTML += `<div class="mosque-card">
                            <h2 style="font-size:1rem; margin:0;">${item.name}</h2>
                            <span class="location-tag">Satkhira Sadar</span>
                            <div class="food-text"><div class="food-icon-box">${icon}</div>${item.food}</div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <a href="https://www.google.com/maps?q=${item.lat},${item.lon}" target="_blank" style="color:var(--primary); font-weight:700; text-decoration:none; font-size:0.85rem;">📍 ম্যাপে দেখুন</a>
                                ${isAdmin ? `<button onclick="db.ref('iftar_posts/${id}').remove()" style="background:#fee2e2; color:red; border:none; padding:5px 12px; border-radius:8px; font-weight:700; cursor:pointer;">মুছুন</button>` : ''}
                            </div>
                        </div>`;
                    });
                }
            });
        }
        window.onload = initMap;
    </script>
</body>
</html>
