<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biriyanidibe | Premium Satkhira</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00a86b; --danger: #ff4d4d; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Hind Siliguri', sans-serif; margin: 0; background: var(--bg); color: #1e293b; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 30px rgba(0,0,0,0.03); }
        .logo-box { display: flex; align-items: center; gap: 8px; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        
        .admin-trigger { background: #f1f5f9; width: 42px; height: 42px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #64748b; cursor: pointer; transition: 0.4s ease; }
        .admin-trigger.active { background: linear-gradient(135deg, #00a86b, #00c880); color: white; box-shadow: 0 5px 15px rgba(0,168,107,0.3); }

        #map-admin-badge { display: none; position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(8px); color: #00ffa3; padding: 8px 15px; border-radius: 50px; z-index: 1000; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(0, 255, 163, 0.3); white-space: nowrap; }

        .container { max-width: 480px; margin: auto; padding: 20px; flex: 1; }
        .map-wrapper { position: relative; background: var(--white); padding: 10px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); margin-bottom: 25px; }
        #map { height: 220px; width: 100%; border-radius: 22px; }

        .food-marker { background: white; border: 3px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; width: 45px !important; height: 45px !important; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .glass-input { background: var(--white); padding: 25px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); margin-bottom: 30px; }
        select, input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #f1f5f9; border-radius: 15px; outline: none; background: #f8fafc; font-family: inherit; }
        .submit-btn { background: linear-gradient(135deg, #00a86b, #00c880); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: 700; cursor: pointer; }

        .mosque-card { background: var(--white); padding: 25px; border-radius: 25px; margin-bottom: 20px; border: 1px solid #f1f5f9; position: relative; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

        .del-btn { background: #fee2e2; color: var(--danger); border: none; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.7rem; position: absolute; top: 20px; right: 20px; }
        
        .food-text { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 12px; margin: 15px 0; }
        .food-icon-box { background: #f0fdf4; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }

        .status-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 30px; border-radius: 30px; z-index: 5000; width: 280px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.3); animation: popScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popScale { from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        #welcome-popup { background: white; border: 2px solid var(--primary); }
        #wrong-popup { background: #fff5f5; border: 2px solid var(--danger); }

        #pass-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }

        footer { text-align: center; padding: 40px 20px; border-top: 1px solid #f1f5f9; background: #fff; margin-top: auto; }
        .footer-text { color: var(--primary); font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; display: block; }
        .footer-sub { font-size: 0.85rem; color: #94a3b8; font-weight: 600; margin-bottom: 15px; display: block; }
        .social-links { display: flex; justify-content: center; gap: 15px; }
        .social-links a { width: 42px; height: 42px; background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #475569; text-decoration: none; transition: 0.3s; font-size: 1.2rem; }
        .social-links a:hover { background: var(--primary); color: white; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div id="welcome-popup" class="status-popup">
        <div style="font-size: 3rem; margin-bottom: 10px;">🍲</div>
        <h3 style="margin: 0;">Admin Active</h3>
        <p style="color: var(--primary); font-weight: 700;">SECURED BY SAKIB</p>
    </div>

    <div id="wrong-popup" class="status-popup">
        <div style="font-size: 3rem; margin-bottom: 10px;">🚫</div>
        <h3 style="color: #b91c1c;">ভুল পাসওয়ার্ড!</h3>
        <p style="font-weight: 600;">তুই বিরিয়ানি ফিড চেক কর,<br>এডমিন মুডে কী?</p>
    </div>

    <nav>
        <div class="logo-box"><div class="logo">Biriyani<span>dibe</span></div></div>
        <div class="admin-trigger" id="adminIcon" onclick="document.getElementById('pass-modal').style.display='flex'"><i class="fas fa-fingerprint"></i></div>
    </nav>

    <div class="container">
        <div class="map-wrapper">
            <div id="map-admin-badge"><i class="fas fa-user-shield"></i> Admin Mode Active | SAKIB</div>
            <div id="map"></div>
        </div>

        <div class="glass-input">
            <h3 style="margin:0 0 10px 0;">ইফতার আপডেট</h3>
            <select id="mosqueSelect">
                <option value="সাতক্ষীরা সরকারি কলেজ মসজিদ" data-lat="22.7188" data-lon="89.0705">সাতক্ষীরা সরকারি কলেজ মসজিদ</option>
                <option value="সাতক্ষীরা কেন্দ্রীয় জামে মসজিদ" data-lat="22.7102" data-lon="89.0715">সাতক্ষীরা কেন্দ্রীয় জামে মসজিদ</option>
                <option value="সদর হাসপাতাল জামে মসজিদ" data-lat="22.7125" data-lon="89.0735">সদর হাসপাতাল জামে মসজিদ</option>
                <option value="পলাশপোল কেন্দ্রীয় মসজিদ" data-lat="22.7155" data-lon="89.0688">পলাশপোল কেন্দ্রীয় মসজিদ</option>
                <option value="পুরাতন বাজার জামে মসজিদ" data-lat="22.7065" data-lon="89.0755">পুরাতন বাজার জামে মসজিদ</option>
                <option value="রসুলপুর মেইন মসজিদ" data-lat="22.7220" data-lon="89.0675">রসুলপুর মেইন মসজিদ</option>
                <option value="কামালনগর জামে মসজিদ" data-lat="22.7165" data-lon="89.0775">কামালনগর জামে মসজিদ</option>
                <option value="মুন্সিপাড়া বাজার মসজিদ" data-lat="22.7145" data-lon="89.0645">মুন্সিপাড়া বাজার মসজিদ</option>
                <option value="কাটিয়া লস্করপাড়া মসজিদ" data-lat="22.7050" data-lon="89.0680">কাটিয়া লস্করপাড়া মসজিদ</option>
                <option value="নিউ মার্কেট জামে মসজিদ" data-lat="22.7110" data-lon="89.0785">নিউ মার্কেট জামে মসজিদ</option>
                <option value="সুলতানপুর জামে মসজিদ" data-lat="22.7020" data-lon="89.0730">সুলতানপুর জামে মসজিদ</option>
                <option value="লাবসা জামে মসজিদ" data-lat="22.7300" data-lon="89.0650">লাবসা জামে মসজিদ</option>
                <option value="মাছখোলা মসজিদ" data-lat="22.6900" data-lon="89.0750">মাছখোলা মসজিদ</option>
                <option value="কুখরালী মসজিদ" data-lat="22.7250" data-lon="89.0820">কুখরালী মসজিদ</option>
                <option value="ইটাগাছা জামে মসজিদ" data-lat="22.6980" data-lon="89.0710">ইটাগাছা জামে মসজিদ</option>
                <option value="বজবজিয়া মসজিদ" data-lat="22.7350" data-lon="89.0720">বজবজিয়া মসজিদ</option>
                <option value="আগরদাড়ি জামে মসজিদ" data-lat="22.7500" data-lon="89.0600">আগরদাড়ি জামে মসজিদ</option>
                <option value="ঝাউডাঙ্গা বাজার মসজিদ" data-lat="22.7950" data-lon="89.0850">ঝাউডাঙ্গা বাজার মসজিদ</option>
                <option value="ধুলিহর জামে মসজিদ" data-lat="22.6650" data-lon="89.1150">ধুলিহর জামে মসজিদ</option>
                <option value="শিবপুর মসজিদ" data-lat="22.6850" data-lon="89.0350">শিবপুর মসজিদ</option>
            </select>
            <input type="text" id="foodMenu" placeholder="খাবারের মেনু...">
            <button class="submit-btn" onclick="postIftar()">পাবলিশ</button>
        </div>

        <div id="updateList"></div>
    </div>

    <div id="pass-modal">
        <div class="modal-content" style="background: white; padding: 30px; border-radius: 30px; text-align: center; width: 280px;">
            <i class="fas fa-lock" style="font-size:2rem; color:var(--primary); margin-bottom:15px;"></i>
            <input type="password" id="adminPass" placeholder="••••" style="text-align:center; font-size:1.2rem; letter-spacing:5px;">
            <button class="submit-btn" onclick="unlockAdmin()">Unlock</button>
        </div>
    </div>

    <footer>
        <span class="footer-text">DEVELOPER SAKIB</span>
        <span class="footer-sub">© 2026 | SATKHIRA SADAR</span>
        <div class="social-links">
            <a href="https://facebook.com/yourlink" target="_blank" title="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="https://github.com/yourlink" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAqP9zVb_Nz9eKE5MCqKgNhCBLAe1ya5bs",
            databaseURL: "https://satkhira-iftary-default-rtdb.firebaseio.com",
            projectId: "satkhira-iftary",
            appId: "1:58587509961:web:f855940e4bb125af6cc918"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let isAdmin = false, map, markers = L.layerGroup();

        function unlockAdmin() {
            const pass = document.getElementById('adminPass').value;
            const modal = document.getElementById('pass-modal');
            if(pass === "75") {
                isAdmin = true;
                modal.style.display = 'none';
                document.getElementById('welcome-popup').style.display = 'block';
                setTimeout(() => { 
                    document.getElementById('welcome-popup').style.display = 'none'; 
                    document.getElementById('adminIcon').classList.add('active');
                    document.getElementById('map-admin-badge').style.display = 'block';
                    loadPosts();
                }, 2500);
            } else {
                modal.style.display = 'none';
                document.getElementById('wrong-popup').style.display = 'block';
                setTimeout(() => { document.getElementById('wrong-popup').style.display = 'none'; }, 3500);
            }
        }

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([22.7133, 89.0722], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markers.addTo(map);
            loadPosts();
        }

        function postIftar() {
            const sel = document.getElementById('mosqueSelect'), food = document.getElementById('foodMenu').value;
            if(!food) return;
            db.ref('iftar_posts').push({
                name: sel.value, food: food,
                lat: sel.options[sel.selectedIndex].dataset.lat,
                lon: sel.options[sel.selectedIndex].dataset.lon
            });
            document.getElementById('foodMenu').value = '';
        }

        function loadPosts() {
            db.ref('iftar_posts').on('value', (snap) => {
                const list = document.getElementById('updateList');
                list.innerHTML = ''; markers.clearLayers();
                const data = snap.val();
                if(data) {
                    Object.keys(data).reverse().forEach(id => {
                        const item = data[id];
                        let icon = (item.food.includes("খিচুড়ি") || item.food.toLowerCase().includes("khichuri")) ? "🍛" : "🍲";
                        L.marker([item.lat, item.lon], {icon: L.divIcon({html: icon, className: 'food-marker', iconSize:[45,45]})}).addTo(markers);
                        list.innerHTML += `<div class="mosque-card">
                            <button class="del-btn" style="display:${isAdmin?'block':'none'}" onclick="db.ref('iftar_posts/'+'${id}').remove()">মুছুন</button>
                            <h2 style="font-size:1.1rem; margin:0;">${item.name}</h2>
                            <div class="food-text"><div class="food-icon-box">${icon}</div>${item.food}</div>
                            <a href="https://www.google.com/maps/search/?api=1&query=${item.lat},${item.lon}" target="_blank" style="color:var(--primary); font-weight:700; text-decoration:none; font-size:0.85rem;">📍 ম্যাপে দেখুন</a>
                        </div>`;
                    });
                }
            });
        }
        window.onload = initMap;
    </script>
</body>
</html>
