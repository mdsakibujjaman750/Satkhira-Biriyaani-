<!DOCTYPE html>
<html lang="bn">
<head>
    <meta name="google-site-verification" content="bkGm7IXqbGp56YAmv8jThie3be_i6MVF3x8piS8zgL4" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biriyanidibe | Satkhira Sadar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Ubuntu:wght@700&family=Righteous&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #00a86b; --danger: #ff4d4d; --bg: #f8fafc; 
            --white: #ffffff; --text: #1e293b; --border: #e2e8f0; --card-bg: #ffffff;
        }

        body.dark-mode {
            --bg: #0f172a; --white: #1e293b; --text: #f8fafc; 
            --border: #334155; --card-bg: #1e293b;
        }

        body { font-family: 'Hind Siliguri', sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; transition: 0.3s; }
        
        nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; box-shadow: 0 2px 20px rgba(0,0,0,0.05); }
        body.dark-mode nav { background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid var(--border); }

        .logo-container { display: flex; align-items: center; gap: 8px; }
        .logo-text { font-family: 'Righteous', cursive; font-size: 1.8rem; background: linear-gradient(135deg, var(--text) 30%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        body.dark-mode .logo-text { background: linear-gradient(135deg, #f8fafc 30%, #00a86b 100%); -webkit-background-clip: text; }
        .logo-text span { color: var(--primary); -webkit-text-fill-color: var(--primary); }

        .container { max-width: 450px; margin: auto; padding: 15px; flex: 1; width: 100%; box-sizing: border-box; }
        
        #admin-active-badge { 
            display: none; background: rgba(0, 168, 107, 0.2); color: var(--primary); 
            padding: 8px 15px; border-radius: 50px; text-align: center; font-weight: 700; margin-bottom: 15px; border: 1px solid var(--primary);
        }

        .map-wrapper { background: var(--card-bg); padding: 6px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border); overflow: hidden; }
        #map { height: 200px; width: 100%; border-radius: 20px; }

        .glass-input { background: var(--card-bg); padding: 20px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        select, input { width: 100%; padding: 14px; margin-top: 8px; border: 1.5px solid var(--border); border-radius: 12px; outline: none; background: var(--bg); color: var(--text); font-family: inherit; box-sizing: border-box; }
        
        .food-selector-container { display: none; gap: 10px; margin-top: 12px; justify-content: center; }
        .food-chip { background: var(--bg); border: 1.5px solid var(--border); padding: 10px 18px; border-radius: 50px; cursor: pointer; font-weight: 700; color: var(--text); }

        .submit-btn { background: linear-gradient(135deg, #00a86b, #01d688); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 15px; }

        .mosque-card { background: var(--card-bg); padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid var(--border); }
        .food-text { font-size: 1.1rem; font-weight: 700; margin: 10px 0; display: flex; align-items: center; gap: 10px; color: var(--text); }

        /* CUSTOM MAP ICON STYLE */
        .custom-map-icon { background: none; border: none; }
        .icon-box { font-size: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); text-align: center; }

        .status-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 30px; border-radius: 30px; z-index: 5000; width: 280px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.3); background: white; }
        
        #pass-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:3000; align-items:center; justify-content:center; backdrop-filter:blur(8px); }

        footer { text-align: center; padding: 30px 20px; border-top: 1px solid var(--border); background: var(--card-bg); margin-top: auto; }
        .social-links a { width: 45px; height: 45px; background: var(--bg); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; color: var(--text); text-decoration: none; border: 1px solid var(--border); font-size: 1.2rem; transition: 0.3s; margin: 0 5px; }
    </style>
</head>
<body id="body">

    <div id="wrong-popup" class="status-popup" style="background: #fff5f5; border: 2px solid var(--danger);">
        <div style="font-size: 3rem; margin-bottom: 10px;">🚫</div>
        <h3 style="color: #b91c1c; margin: 0;">ভুল পাসওয়ার্ড!</h3>
        <p style="color: #444; font-weight: 600;">তুই বিরিয়ানি ফিড চেক কর,<br>এডমিন মুডে কি?</p>
    </div>

    <nav>
        <div class="logo-container">
            <div class="logo-text">Biriyani<span>dibe</span></div>
            <div style="font-size: 1.8rem;">🍲</div>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="modeBtn" style="cursor:pointer; color:var(--text); font-size: 1.2rem;"><i class="fas fa-moon"></i></div>
            <div id="adminBtn" style="cursor:pointer; color:#64748b;"><i class="fas fa-fingerprint fa-lg"></i></div>
        </div>
    </nav>

    <div class="container">
        <div id="admin-active-badge">Admin mode Active | SAKIB</div>
        
        <div class="map-wrapper">
            <div id="map"></div>
        </div>

        <div class="glass-input">
            <select id="mosqueSelect">
                <option value="">মসজিদ সিলেক্ট করুন</option>
                <option value="সাতক্ষীরা সরকারি কলেজ মসজিদ" data-lat="22.7188" data-lon="89.0705">সাতক্ষীরা সরকারি কলেজ মসজিদ</option>
                <option value="সাতক্ষীরা কেন্দ্রীয় জামে মসজিদ" data-lat="22.7102" data-lon="89.0715">সাতক্ষীরা কেন্দ্রীয় জামে মসজিদ</option>
                <option value="সদর হাসপাতাল জামে মসজিদ" data-lat="22.7125" data-lon="89.0735">সদর হাসপাতাল জামে মসজিদ</option>
            </select>
            <input type="text" id="customMosqueName" placeholder="মসজিদের নাম...">
            <input type="text" id="foodMenu" placeholder="আজকের মেনু..." onfocus="document.getElementById('foodSelector').style.display='flex'" readonly>
            <div id="foodSelector" class="food-selector-container">
                <div class="food-chip" onclick="selectFood('বিরিয়ানি')">🍛 বিরিয়ানি</div>
                <div class="food-chip" onclick="selectFood('খিচুড়ি')">🍲 খিচুড়ি</div>
            </div>
            <button class="submit-btn" onclick="postIftar()">পাবলিশ করুন</button>
        </div>

        <div id="updateList"></div>
    </div>

    <div id="pass-modal">
        <div style="background:var(--card-bg); padding:30px; border-radius:25px; text-align:center; width:280px; border:1px solid var(--border);">
            <h3 style="color:var(--text)">অ্যাডমিন অ্যাক্সেস</h3>
            <input type="password" id="adminPass" placeholder="পিন কোড" style="text-align:center;">
            <button class="submit-btn" onclick="unlockAdmin()">আনলক</button>
        </div>
    </div>

    <footer>
        <span style="color:var(--primary); font-weight:800; font-size: 1.1rem;">DEVELOPER SAKIB</span><br>
        <span style="font-size: 0.85rem; color:#94a3b8; font-weight: 600;">©2026 | SATKHIRA SADAR</span>
        <div class="social-links" style="margin-top: 15px;">
            <a href="https://www.facebook.com/share/1C2PZ6Zq1h/" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://github.com/mdsakibujjaman750" target="_blank"><i class="fab fa-github"></i></a>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // DARK MODE
        const modeBtn = document.getElementById('modeBtn');
        modeBtn.onclick = () => {
            document.getElementById('body').classList.toggle('dark-mode');
            const icon = modeBtn.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        };

        const firebaseConfig = {
            apiKey: "AIzaSyAqP9zVb_Nz9eKE5MCqKgNhCBLAe1ya5bs",
            databaseURL: "https://satkhira-iftary-default-rtdb.firebaseio.com",
            projectId: "satkhira-iftary",
            appId: "1:58587509961:web:f855940e4bb125af6cc918"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isAdmin = false, map, markers = L.layerGroup();

        function selectFood(val) { 
            document.getElementById('foodMenu').value = val; 
            document.getElementById('foodSelector').style.display = 'none'; 
        }

        function unlockAdmin() {
            if(document.getElementById('adminPass').value === "75") {
                isAdmin = true;
                document.getElementById('pass-modal').style.display = 'none';
                document.getElementById('admin-active-badge').style.display = 'block';
                loadPosts();
            } else {
                document.getElementById('pass-modal').style.display = 'none';
                document.getElementById('wrong-popup').style.display = 'block';
                setTimeout(() => { document.getElementById('wrong-popup').style.display = 'none'; }, 3000);
            }
        }

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([22.7133, 89.0722], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markers.addTo(map);
            loadPosts();
        }

        function postIftar() {
            const s = document.getElementById('mosqueSelect');
            const name = document.getElementById('customMosqueName').value || s.value;
            const food = document.getElementById('foodMenu').value;
            if(!name || !food) return;

            let lat = 22.7133, lon = 89.0722;
            if(!document.getElementById('customMosqueName').value && s.selectedIndex > 0) {
                lat = s.options[s.selectedIndex].dataset.lat;
                lon = s.options[s.selectedIndex].dataset.lon;
            }
            db.ref('iftar_posts').push({ name, food, lat, lon });
            document.getElementById('foodMenu').value = '';
        }

        function loadPosts() {
            db.ref('iftar_posts').on('value', (snap) => {
                const list = document.getElementById('updateList');
                list.innerHTML = ''; markers.clearLayers();
                const data = snap.val();
                if(data) {
                    Object.keys(data).reverse().forEach(id => {
                        const item = data[id];
                        let iconText = (item.food === "বিরিয়ানি") ? "🍛" : "🍲";
                        
                        // CUSTOM MARKER ICON
                        const customIcon = L.divIcon({
                            html: `<div class="icon-box">${iconText}</div>`,
                            className: 'custom-map-icon',
                            iconSize: [30, 30],
                            iconAnchor: [15, 15]
                        });

                        L.marker([item.lat, item.lon], {icon: customIcon}).addTo(markers);
                        
                        list.innerHTML += `<div class="mosque-card">
                            <h2 style="font-size:1.1rem; margin:0;">${item.name}</h2>
                            <div class="food-text"><span>${iconText}</span> ${item.food}</div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <a href="https://www.google.com/maps?q=${item.lat},${item.lon}" target="_blank" style="color:var(--primary); text-decoration:none; font-weight:700;">📍 ম্যাপে দেখুন</a>
                                ${isAdmin ? `<button onclick="db.ref('iftar_posts/${id}').remove()" style="color:red; border:none; background:none; cursor:pointer; font-weight:700;">মুছুন</button>` : ''}
                            </div>
                        </div>`;
                    });
                }
            });
        }
        document.getElementById('adminBtn').onclick = () => document.getElementById('pass-modal').style.display = 'flex';
        window.onload = initMap;
    </script>
</body>
</html>
